<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <!-- Include your CSS and other resources -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Loading screen -->
    <div id="loadingScreen" class="loading">Loading...</div>

    <h2>Sign Up</h2>
    <form id="signupForm">
        <div>
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <!-- Button to toggle password visibility -->
            <button type="button" id="togglePassword">Show Password</button>
        </div>
        <button type="submit">Sign Up</button>
    </form>

    <!-- Back to login button -->
    <button id="backToLogin">Back to Login</button>

    <!-- Include the signup script -->
    <script src="signup-script.js"></script>
</body>
</html>
