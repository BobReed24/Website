<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird</title>
<style>
    body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #9BE8FF;
    }

    #game {
        position: relative;
        width: 300px;
        height: 500px;
        background-color: #87CEEB;
        border: 5px solid #000;
        overflow: hidden;
    }

    #bird {
        position: absolute;
        top: 50%;
        left: 50px;
        width: 30px;
        height: 30px;
        background-color: #FFD700;
        border-radius: 50%;
    }

    .pipe {
        position: absolute;
        width: 50px;
        background-color: #2F4F4F;
        border-radius: 10px;
    }

    #score {
        position: absolute;
        top: 20px;
        left: 20px;
        font-size: 24px;
        color: #000;
    }

    #backButton {
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 10px 20px;
        background-color: #FF4500;
        color: #FFF;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        z-index: 9999;
    }
</style>
</head>
<body>

<button id="backButton" onclick="window.location.href = 'index.html';">Back to Homepage</button>

<div id="game">
    <div id="bird"></div>
    <div id="score">0</div>
</div>

<script>
    const bird = document.getElementById('bird');
    const game = document.getElementById('game');
    const scoreDisplay = document.getElementById('score');
    const backButton = document.getElementById('backButton');

    let birdTop = 220;
    let gravity = 3;
    let isGameOver = false;
    let score = 0;

    function jump() {
        if (!isGameOver) birdTop -= 60;
    }

    document.addEventListener('keydown', jump);

    function gameLoop() {
        if (!isGameOver) {
            birdTop += gravity;
            bird.style.top = birdTop + 'px';

            const pipes = document.querySelectorAll('.pipe');

            pipes.forEach(pipe => {
                const pipeLeft = parseInt(pipe.style.left);

                if (pipeLeft >= 0 && pipeLeft <= 30 && birdTop <= 30) {
                    endGame();
                }

                pipe.style.left = pipeLeft - 3 + 'px';

                if (pipeLeft <= -50) {
                    pipe.parentElement.removeChild(pipe);
                    score++;
                    scoreDisplay.textContent = score;
                    createPipe();
                }
            });

            if (birdTop <= 0 || birdTop >= 470) {
                endGame();
            }
        }

        requestAnimationFrame(gameLoop);
    }

    function createPipe() {
        const pipe = document.createElement('div');
        pipe.classList.add('pipe');
        pipe.style.height = Math.floor(Math.random() * 250) + 'px';
        pipe.style.left = '300px';
        game.appendChild(pipe);
    }

    function endGame() {
        isGameOver = true;
        alert('Game Over! Your score: ' + score);
    }

    createPipe();
    gameLoop();
</script>

</body>
</html>
