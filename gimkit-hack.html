<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gimkit Emulation</title>
    <style>
        /* Reset default margin and padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        /* Header styles */
        header {
            background-color: #333;
            color: #fff;
            padding: 10px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 36px;
        }

        /* Content styles */
        .content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Footer styles */
        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 10px 0;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        /* Developer console styles */
        .console {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 300px;
            background-color: #333;
            color: #fff;
            padding: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.5);
        }

        .console textarea {
            width: calc(100% - 20px);
            height: 100px;
            margin-bottom: 10px;
            resize: vertical;
        }

        .console button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            width: 100%;
        }

        .console button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <h1>Gimkit Emulation</h1>
    </header>

    <!-- Content Section -->
    <div class="content">
        <iframe src="https://www.gimkit.com/me" style="width:100%; height:100vh; border:none;"></iframe>
    </div>

    <!-- Developer Console -->
    <div class="console">
        <textarea id="console-input" placeholder="Enter JavaScript code here..."></textarea>
        <button id="run-code-btn">Run</button>
    </div>

    <!-- Footer -->
    <footer>
        &copy; 2024 Your Website
    </footer>

    <script>
        // JavaScript code goes here
        // Add event listeners and functionality for the developer console
        document.getElementById('run-code-btn').addEventListener('click', function() {
            var code = document.getElementById('console-input').value;
            try {
                eval(code);
            } catch (error) {
                console.error(error);
            }
        });
    </script>
</body>
</html>
