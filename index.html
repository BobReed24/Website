<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <!-- Include your CSS and other resources -->
    <style>
        /* Additional CSS for the login and logout buttons */
        #login-button,
        #logout-button {
            background-color: #007bff;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #logout-button {
            display: none;
        }
        #username-display {
            font-weight: bold;
        }
        /* Additional CSS for the Windows 96 button */
        #windows96-button {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        /* Additional CSS for the debug button */
        #debug-button {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: #ff0000;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        /* Additional CSS for the background image */
        body {
            background-image: url('background.png');
            background-size: cover;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>
    <!-- Login button -->
    <button id="login-button" onclick="window.location.href = 'https://bobreed24.github.io/Website/login';">Login</button>
    <!-- Logout button -->
    <button id="logout-button">Logout</button>

    <!-- Debug button -->
    <button id="debug-button">Debug</button>

    <!-- Windows 96 button -->
    <button id="windows96-button">Windows 96</button>

    <h1>Welcome to the Homepage</h1>
    <!-- Display the username -->
    <div id="username-display"></div>

    <!-- Your homepage content here -->

    <!-- Include your JavaScript file -->
    <script src="index-script.js"></script>
    <script src="lockdown-check.js"></script> <!-- Include the lockdown check script -->
</body>
</html>
