<!DOCTYPE html>
<html lang="en">
<head>

    <title>Hunkon Auth Portal</title>
</head>
<body>
    <div style="text-align: center; margin-top: 100px;">
        <h2>Welcome to Hunkon Auth Portal</h2>

        <input type="text" id="secretInput" placeholder="Enter secret code">
        <br><br>
        <button onclick="submitSecret()">Submit Secret</button>
    </div>

    <script>
        function submitSecret() {
            var secret = document.getElementById('secretInput').value;
            if (secret === 'HqR5Z0SNgWkYGOaRGz61xxFKbDMKNFWd') {
                window.location.href = 'index.html';
            } else {
                alert('Invalid secret code. Please try again.');
            }
        }
    </script>
</body>
</html>
