<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- Include your CSS and other resources -->
    <style>
        /* Additional CSS for layout */
        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .form-group button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .form-group .captcha {
            margin-top: 10px;
        }
        .error-message {
            color: #ff0000;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Login</h2>
        <!-- Login form -->
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="captcha">CAPTCHA:</label>
                <input type="text" id="captcha" name="captcha" required>
                <div class="captcha" id="captchaQuestion"></div>
            </div>
            <button type="submit">Login</button>
        </form>

        <!-- Error message -->
        <div id="errorMessage" class="error-message">Username, password, or CAPTCHA is incorrect</div>

        <!-- Signup button -->
        <div class="form-group">
            <!-- Changed the onclick attribute to redirect to bobreed24.github.io/Website/signup.html -->
            <button class="signup-button" onclick="window.location.href = 'https://bobreed24.github.io/Website/signup.html';">Sign Up</button>
        </div>

        <!-- Include your JavaScript file -->
        <script src="/login-script.js"></script>
    </div>

    <script>
        // Generate and display CAPTCHA
        const captchaQuestion = Math.floor(Math.random() * 10) + ' + ' + Math.floor(Math.random() * 10);
        document.getElementById('captchaQuestion').textContent = 'Please solve the following CAPTCHA: ' + captchaQuestion;

        // Validate CAPTCHA
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const captchaInput = document.getElementById('captcha').value;
            const expectedResult = eval(captchaQuestion); // Evaluate the expression

            if (captchaInput != expectedResult) {
                // CAPTCHA is incorrect, display error message
                document.getElementById('errorMessage').style.display = 'block';
            }
        });
    </script>
</body>
</html>
