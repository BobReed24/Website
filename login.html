<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- Include your CSS and other resources -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h2>Login</h2>
        <!-- Login form -->
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="captcha">CAPTCHA:</label>
                <input type="text" id="captcha" name="captcha" required>
                <div class="captcha" id="captchaQuestion"></div>
            </div>
            <button type="submit">Login</button>
        </form>

        <!-- Error message -->
        <div id="errorMessage" class="error-message">Username, password, or CAPTCHA is incorrect</div>

        <!-- Signup button -->
        <div class="form-group">
            <button class="signup-button" onclick="window.location.href = 'signup.html';">Sign Up</button>
        </div>

        <!-- Include your JavaScript file -->
        <script src="login-script.js"></script>
    </div>
</body>
</html>
