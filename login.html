<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hunkon Auth Portal</title>
    <!-- Include your CSS and other resources -->
    <style>
        /* Additional CSS for layout */
        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .form-group button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .error-message {
            color: #ff0000;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Hunkon Auth Portal</h2>
        <!-- Secret form -->
        <form id="secretForm">
            <div class="form-group">
                <label for="secret">Secret:</label>
                <input type="password" id="secret" name="secret" required>
            </div>
            <button type="submit">Submit Secret</button>
        </form>

        <!-- Error message -->
        <div id="errorMessage" class="error-message">Incorrect secret</div>

        <!-- Include your JavaScript file -->
        <script src="/login-script.js"></script>
    </div>

    <script>
        // Track number of times login button is clicked
        let loginButtonClicks = 0;

        // Validate secret
        document.getElementById('secretForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const secretInput = document.getElementById('secret').value;

            // If the secret is entered correctly, redirect to index.html
            if (secretInput === 'HqR5Z0SNgWkYGOaRGz61xxFKbDMKNFWd') {
                window.location.href = 'index.html';
            } else {
                // Display error message
                document.getElementById('errorMessage').style.display = 'block';
            }
        });

        // Check if the user clicked the login button 4 times
        document.getElementById('login-button').addEventListener('click', function() {
            loginButtonClicks++;

            // Check if the secret 'boogabooga' was entered
            if (loginButtonClicks === 4 && document.getElementById('secret').value === 'boogabooga') {
                window.location.href = 'index-admin.html'; // Redirect to index-admin.html
            }
        });
    </script>
</body>
</html>
