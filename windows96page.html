<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 96</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        #windows96-container {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            position: relative; /* Add position relative to enable absolute positioning */
        }
        #windows96-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        /* Additional CSS for the back-to-home button */
        #back-to-home-button {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="windows96-container">
        <iframe id="windows96-iframe" src="https://windows96.net/"></iframe>
        <!-- Button to go back to the homepage -->
        <button id="back-to-home-button" onclick="goToHomepage()">Back to Homepage</button>
    </div>

    <script>
        // Function to redirect to the homepage
        function goToHomepage() {
            window.location.href = '/index.html'; // Adjust the URL as needed
        }
    </script>
</body>
</html>
